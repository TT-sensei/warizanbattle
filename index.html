<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>筆算バトル - 必殺技エディション</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: rgba(255, 255, 255, 0.95);
            --line-color: rgba(52, 152, 219, 0.3);
            --accent-tateru: #ff9f43;
            --accent-kakeru: #feca57;
            --accent-hiku: #ff6b6b;
            --accent-orosu: #48dbfb;
        }

        body {
            font-family: 'Hiragino Maru Gothic ProN', sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* --- ヘッダー：ステップインジケーター --- */
        .step-indicator {
            display: flex;
            justify-content: space-around;
            background: #222;
            padding: 10px 0;
            border-bottom: 2px solid #444;
            z-index: 10;
        }
        .step-item {
            font-weight: bold;
            font-size: 14px;
            padding: 5px 12px;
            border-radius: 20px;
            opacity: 0.3;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        .step-item.active {
            opacity: 1;
            transform: scale(1.1);
            border-color: white;
            box-shadow: 0 0 10px currentColor;
        }

        /* --- メインフィールド --- */
        .main-game {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: radial-gradient(circle, #2c3e50 0%, #000 100%);
            position: relative;
        }

        .side-area {
            width: 80px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
        }

        .char-sprite { font-size: 50px; transition: transform 0.2s; }
        .hp-bar-v {
            width: 12px; height: 120px;
            background: #333; border: 1px solid #fff;
            border-radius: 6px; position: relative; overflow: hidden;
            margin-top: 10px;
        }
        .hp-fill-v {
            position: absolute; bottom: 0; width: 100%;
            transition: height 0.3s ease-out;
        }

        /* --- 中央：筆算ボード --- */
        .center-board {
            background: var(--panel-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
            color: #333;
            z-index: 5;
            background-image: linear-gradient(to right, 
                transparent 45px, var(--line-color) 45px, var(--line-color) 47px,
                transparent 47px, transparent 85px, var(--line-color) 85px, var(--line-color) 87px,
                transparent 87px, transparent 125px, var(--line-color) 125px, var(--line-color) 127px,
                transparent 127px
            );
        }

        .hissan-grid {
            display: grid;
            grid-template-columns: repeat(4, 40px);
            grid-auto-rows: 40px;
        }

        .cell {
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: bold; position: relative;
        }
        .border-bottom { border-bottom: 3px solid #333; }
        .bracket { 
            border-left: 3px solid #333; border-top: 3px solid #333;
            border-top-left-radius: 10px; margin-top: 15px; height: 25px;
        }

        /* 入力ボックス */
        .input-box {
            width: 34px; height: 34px;
            border: 2px dashed #bbb; border-radius: 5px;
            text-align: center; line-height: 34px; background: transparent;
        }
        .input-box.active {
            border: 3px solid #e74c3c;
            background: rgba(231, 76, 60, 0.15);
            animation: pulse 0.6s infinite alternate;
        }
        .input-box.correct { border: none; color: #333; }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
        .drop-anim { animation: dropDown 0.4s ease-in forwards; }
        @keyframes dropDown { 0% { transform: translateY(-30px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

        /* --- 必殺技カットイン --- */
        .cutin-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 44px;
            font-weight: 900;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 4px 4px 10px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            white-space: nowrap;
        }
        .cutin-anim { animation: cutin 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes cutin {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2) rotate(5deg); opacity: 1; }
            70% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        .msg-overlay {
            position: absolute; top: 15px; width: 100%; text-align: center;
            font-size: 16px; font-weight: bold; pointer-events: none;
            text-shadow: 2px 2px 4px #000; z-index: 10;
        }

        /* --- テンキー --- */
        .controls {
            background: #1a1a1a; padding: 10px;
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        .btn {
            height: 60px; background: #eee; border: none; border-radius: 10px;
            font-size: 24px; font-weight: bold; color: #333;
            box-shadow: 0 4px 0 #999; cursor: pointer;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }

        .screen-red { position: fixed; inset:0; background: rgba(255,0,0,0.4); opacity:0; pointer-events:none; transition: opacity 0.2s; z-index: 100; }
        .shake { animation: shakeAnim 0.4s; }
        @keyframes shakeAnim { 0%, 100% {transform:translateX(0);} 25% {transform:translateX(-10px) rotate(-2deg);} 75% {transform:translateX(10px) rotate(2deg);} }
    </style>
</head>
<body>

    <div id="red-flash" class="screen-red"></div>

    <div class="step-indicator">
        <div id="step-tateru" class="step-item" style="color:var(--accent-tateru)">①たてる</div>
        <div id="step-kakeru" class="step-item" style="color:var(--accent-kakeru)">②かける</div>
        <div id="step-hiku" class="step-item" style="color:var(--accent-hiku)">③ひく</div>
        <div id="step-orosu" class="step-item" style="color:var(--accent-orosu)">④おろす</div>
    </div>

    <div class="main-game" id="main-game">
        <div class="side-area">
            <div id="hero-img" class="char-sprite">🦸</div>
            <div class="hp-bar-v"><div id="hero-hp" class="hp-fill-v" style="background:#2ecc71; height:100%;"></div></div>
            <div style="font-size:10px; margin-top:5px;">勇者</div>
        </div>

        <div class="msg-overlay" id="msg-text">タップしてバトル開始！</div>

        <div id="cutin-text" class="cutin-box"></div>

        <div class="center-board">
            <div id="hissan-grid" class="hissan-grid">
                </div>
        </div>

        <div class="side-area">
            <div id="enemy-img" class="char-sprite">💧</div>
            <div class="hp-bar-v"><div id="enemy-hp" class="hp-fill-v" style="background:#e74c3c; height:100%;"></div></div>
            <div style="font-size:10px; margin-top:5px;" id="enemy-name">スライム</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="inputNum(1)">1</button>
        <button class="btn" onclick="inputNum(2)">2</button>
        <button class="btn" onclick="inputNum(3)">3</button>
        <button class="btn" onclick="inputNum(4)">4</button>
        <button class="btn" onclick="inputNum(5)">5</button>
        <button class="btn" onclick="inputNum(6)">6</button>
        <button class="btn" onclick="inputNum(7)">7</button>
        <button class="btn" onclick="inputNum(8)">8</button>
        <button class="btn" onclick="inputNum(9)">9</button>
        <button class="btn" onclick="inputNum(0)">0</button>
    </div>

    <script>
        // --- Web Audio API (効果音) ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSfx(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'hit') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'damage') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'finish') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.setValueAtTime(554, audioCtx.currentTime + 0.15);
                osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
                osc.start(); osc.stop(audioCtx.currentTime + 0.6);
            }
        }

        // --- ゲームデータ自動生成 ---
        const enemies = [
            { n: "わるスライム", s: "💧" }, { n: "おこコウモリ", s: "🦇" },
            { n: "ドクロナイト", s: "💀" }, { n: "ちびドラゴン", s: "🐉" },
            { n: "マッドゴースト", s: "👻" }, { n: "はぐれロボ", s: "🤖" }
        ];

        let currentStep = 0;
        let scenario = [];
        let heroHp = 3;
        let enemyHp = 0;
        let enemyMaxHp = 0;
        let isGameOver = false;

        // ランダムな初級問題（あまりなし）を生成
        function generateProblem() {
            const a = Math.floor(Math.random() * 4) + 2; // 割る数: 2〜5
            const q1 = Math.floor(Math.random() * 3) + 1; // 十の位の答え: 1〜3
            const q2 = Math.floor(Math.random() * 4); // 一の位の答え: 0〜3
            const d1 = a * q1;
            const d2 = a * q2;
            return { a: a, d1: d1, d2: d2, q1: q1, q2: q2 };
        }

        function initGame() {
            if(heroHp <= 0) return;
            isGameOver = false;
            
            // 敵をランダムに選ぶ
            const enemy = enemies[Math.floor(Math.random() * enemies.length)];
            document.getElementById('enemy-name').innerText = enemy.n;
            document.getElementById('enemy-img').innerText = enemy.s;

            // 問題を生成
            const p = generateProblem();

            scenario = [
                { id: 'q1', ans: p.q1, type: 'tateru', word: '🔥たてる！', msg: `${p.d1}の中に${p.a}はいくつ？` },
                { id: 'm1', ans: p.q1 * p.a, type: 'kakeru', word: '⚡かける！', msg: `${p.a} × ${p.q1} は？` },
                { id: 's1', ans: p.d1 - (p.q1 * p.a), type: 'hiku', word: '💥ひく！', msg: `${p.d1} - ${p.q1 * p.a} は？` },
                { id: 'd2_down', ans: p.d2, type: 'orosu', word: '⬇️おろす！', msg: `となりの ${p.d2} をおろそう` },
                { id: 'q2', ans: p.q2, type: 'tateru', word: '🔥たてる！', msg: `${p.d2}の中に${p.a}は？` },
                { id: 'm2', ans: p.q2 * p.a, type: 'kakeru', word: '⚡かける！', msg: `${p.a} × ${p.q2} は？` },
                { id: 's2', ans: p.d2 - (p.q2 * p.a), type: 'hiku', word: '💥フィニッシュ！', msg: `さいごの引き算！` }
            ];

            enemyMaxHp = scenario.length;
            enemyHp = enemyMaxHp;
            currentStep = 0;
            
            updateHpBar('enemy', 100);
            renderBoard(p.a, p.d1, p.d2);
            
            // 少し待ってから最初のステップへ
            setTimeout(updateStep, 500);
        }

        function renderBoard(a, d1, d2) {
            const grid = document.getElementById('hissan-grid');
            grid.innerHTML = `
                <div class="cell"></div><div class="cell"></div><div class="cell"><div id="q1" class="input-box"></div></div><div class="cell"><div id="q2" class="input-box"></div></div>
                <div class="cell">${a}</div><div class="cell bracket"></div><div class="cell border-bottom">${d1}</div><div class="cell border-bottom">${d2}</div>
                <div class="cell"></div><div class="cell"></div><div class="cell border-bottom"><div id="m1" class="input-box"></div></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"><div id="s1" class="input-box"></div></div><div class="cell"><div id="d2_down" class="input-box"></div></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell border-bottom"><div id="m2" class="input-box"></div></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"><div id="s2" class="input-box"></div></div>
            `;
        }

        function updateStep() {
            if (currentStep >= scenario.length) {
                document.getElementById('msg-text').innerText = "🎉 敵を撃破！次があらわれるぞ！";
                playSfx('finish');
                const eImg = document.getElementById('enemy-img');
                eImg.style.transform = "scale(0) rotate(180deg)";
                setTimeout(() => {
                    eImg.style.transform = "scale(1) rotate(0deg)";
                    initGame();
                }, 2000);
                return;
            }

            const step = scenario[currentStep];
            document.querySelectorAll('.input-box').forEach(el => el.classList.remove('active'));
            document.getElementById(step.id).classList.add('active');
            document.getElementById('msg-text').innerText = step.msg;

            // 上のインジケーターを光らせる
            document.querySelectorAll('.step-item').forEach(el => el.classList.remove('active'));
            document.getElementById('step-' + step.type).classList.add('active');

            // ド派手なカットイン演出
            const cutin = document.getElementById('cutin-text');
            cutin.className = `cutin-box type-${step.type}`;
            cutin.style.color = `var(--accent-${step.type})`;
            cutin.innerText = step.word;
            void cutin.offsetWidth; // リフロー（アニメーション再起動のため）
            cutin.classList.add('cutin-anim');
        }

        function inputNum(num) {
            initAudio(); // 音声コンテキストの許可
            if (isGameOver || currentStep >= scenario.length) {
                if(heroHp <= 0) location.reload(); // ゲームオーバー時はリロード
                return;
            }

            const step = scenario[currentStep];
            const cell = document.getElementById(step.id);

            if (num === step.ans) {
                // 正解
                playSfx('hit');
                cell.innerText = num;
                cell.className = "cell input-box correct";
                
                // おろす時のアニメーション
                if(step.type === 'orosu') cell.classList.add('drop-anim');
                
                // 敵にダメージ
                enemyHp--;
                updateHpBar('enemy', (enemyHp / enemyMaxHp) * 100);
                const eImg = document.getElementById('enemy-img');
                eImg.style.transform = "scale(0.8) translate(10px, -10px)";
                setTimeout(() => eImg.style.transform = "scale(1)", 100);

                currentStep++;
                // 少しだけ待って次へ（テンポ重視）
                setTimeout(updateStep, 250);

            } else {
                // 不正解
                playSfx('damage');
                heroHp--;
                updateHpBar('hero', (heroHp / 3) * 100);
                
                // ダメージ演出
                document.getElementById('main-game').classList.add('shake');
                document.getElementById('red-flash').style.opacity = 1;
                setTimeout(() => {
                    document.getElementById('main-game').classList.remove('shake');
                    document.getElementById('red-flash').style.opacity = 0;
                }, 300);

                document.getElementById('msg-text').innerText = "❌ ミス！ダメージを受けた！";

                if (heroHp <= 0) {
                    isGameOver = true;
                    document.getElementById('msg-text').innerHTML = "💀 勇者はたおれた...<br>画面タップで最初から";
                    document.getElementById('hero-img').innerText = "⚰️";
                }
            }
        }

        function updateHpBar(who, pct) {
            document.getElementById(`${who}-hp`).style.height = pct + "%";
        }

        // 初期スタート待ち
        document.body.addEventListener('click', () => {
            if(currentStep === 0 && !isGameOver && enemyHp === 0) {
                 initAudio();
                 initGame();
            }
        }, {once: true});

    </script>
</body>
</html>
